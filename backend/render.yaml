services:
  - type: web
    name: shei-it-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: shei-it-db
          property: connectionString
      - key: ADMIN_EMAILS
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        sync: false

databases:
  - name: shei-it-db
    plan: free
